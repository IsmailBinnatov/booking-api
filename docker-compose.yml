services:
  # Auth Service
  auth_db:
    image: postgres:15-alpine
    container_name: auth_db
    env_file:
      - ./auth_service/.env
    ports:
      - "5432:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data

  auth_redis:
    image: redis:7-alpine
    container_name: auth_redis
    ports:
      - "6739:6739"
  
  auth_service:
    build: ./auth_service
    env_file:
      - .env
    ports:
      - "8001:8000"
    depends_on:
      - auth_db
      - auth_redis

  # Flight Service
  flight_db:
    image: postgres:15-alpine
    container_name: flight_db
    env_file:
      - ./flight_service/.env
    ports:
      - "5433:5432"
    volumes:
      - flight_db_data:/var/lib/postgresql/data


volumes:
  auth_db_data:
  flight_db_data: